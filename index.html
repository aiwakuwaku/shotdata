<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Golf Shot Tracer</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #4caf50;
            --primary-dark: #2e7d32;
            --bg: #121212;
            --surface: #1e1e1e;
            --accent: #ffeb3b;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: -apple-system, sans-serif;
            margin: 0;
            background: var(--bg);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* クラブ選択：横スクロール */
        #club-header {
            padding-top: calc(var(--safe-top) + 10px);
            background: #000;
            border-bottom: 1px solid #333;
        }
        .club-scroll {
            display: flex;
            overflow-x: auto;
            padding: 10px;
            gap: 8px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .club-scroll::-webkit-scrollbar { display: none; }
        .club-btn {
            flex: 0 0 60px;
            height: 45px;
            background: var(--surface);
            border: 1px solid #444;
            border-radius: 8px;
            color: #aaa;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .club-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--accent);
            transform: scale(1.05);
        }

        /* メインエリア */
        #main-container {
            flex: 1;
            position: relative;
            background: linear-gradient(to top, #1b5e20, #0d2e10);
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; touch-action: none; }

        /* HUD（ヘッドアップディスプレイ） */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .hud-box {
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hud-label { font-size: 10px; color: #aaa; text-transform: uppercase; }
        .hud-value { font-size: 18px; font-weight: bold; color: var(--accent); }

        /* ショット直後のポップアップ */
        #shot-popup {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: black;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* 下部ナビゲーション */
        nav {
            padding-bottom: calc(var(--safe-bottom) + 5px);
            background: #000;
            display: flex;
            justify-content: space-around;
            height: 70px;
            align-items: center;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            text-decoration: none;
            font-size: 10px;
            background: none;
            border: none;
            flex: 1;
        }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }

        /* データ画面のカード改良 */
        #stats-view {
            display: none;
            flex: 1;
            overflow-y: auto;
            background: var(--bg);
            padding: 15px;
            padding-bottom: 100px;
        }
        .club-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .summary-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
        }
        .summary-cell { text-align: center; }
        .summary-cell div:first-child { font-size: 9px; color: #888; }
        .summary-cell div:last-child { font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="club-header">
        <div class="club-scroll" id="club-list"></div>
    </div>

    <div id="main-container">
        <canvas id="rangeCanvas"></canvas>
        
        <div id="hud">
            <div class="hud-box">
                <div class="hud-label">Current Club</div>
                <div class="hud-value" id="hud-club">-</div>
            </div>
            <div class="hud-box" style="text-align: right;">
                <div class="hud-label">Avg Distance</div>
                <div class="hud-value" id="hud-avg">-</div>
            </div>
        </div>

        <div id="shot-popup">150yd (R5)</div>
    </div>

    <div id="stats-view">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0">Statistics</h2>
            <button onclick="clearAll()" style="color:#ff5252; background:none; border:1px solid #ff5252; padding:5px 10px; border-radius:5px;">Clear All</button>
        </div>
        <div id="stats-list"></div>
    </div>

    <nav>
        <button class="nav-item active" onclick="showPage('range')">
            <span class="nav-icon">🎯</span><span>Record</span>
        </button>
        <button class="nav-item" onclick="showPage('stats')">
            <span class="nav-icon">📊</span><span>Data</span>
        </button>
        <button class="nav-item" onclick="undo()">
            <span class="nav-icon">↩️</span><span>Undo</span>
        </button>
    </nav>

    <script>
        const MAX_Y = 300, SIDE_W = 50;
        const clubs = ["1W","3W","3U","4U","5U","5I","6I","7I","8I","9I","PW","52°","58°"];
        let currentClub = "7I", shots = JSON.parse(localStorage.getItem('golf_v5') || '[]');

        // 初期化
        const canvas = document.getElementById('rangeCanvas');
        const ctx = canvas.getContext('2d');
        const clubList = document.getElementById('club-list');

        clubs.forEach(c => {
            const btn = document.createElement('div');
            btn.className = `club-btn ${c === currentClub ? 'active' : ''}`;
            btn.innerText = c;
            btn.onclick = () => {
                currentClub = c;
                document.querySelectorAll('.club-btn').forEach(b => b.classList.toggle('active', b.innerText === c));
                updateUI();
            };
            clubList.appendChild(btn);
        });

        function resize() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            draw();
        }
        window.addEventListener('resize', resize);
        setTimeout(resize, 100);

        // ショット記録
        function handleInput(e) {
            if(document.getElementById('stats-view').style.display === 'flex') return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            const x = (touch.clientX - rect.left) / canvas.width;
            const y = (touch.clientY - rect.top) / canvas.height;

            const dist = Math.round((1 - y) * MAX_Y);
            const side = Math.round((x - 0.5) * (SIDE_W * 2));

            shots.push({ club: currentClub, x, y, dist, side, t: new Date().getTime() });
            localStorage.setItem('golf_v5', JSON.stringify(shots));
            
            showPopup(`${dist}yd (${side >= 0 ? 'R'+side : 'L'+Math.abs(side)})`);
            updateUI();
        }

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});
        canvas.addEventListener('mousedown', handleInput);

        function showPopup(text) {
            const p = document.getElementById('shot-popup');
            p.innerText = text;
            p.style.opacity = 1;
            setTimeout(() => p.style.opacity = 0, 1500);
        }

        function showPage(page) {
            const isRange = page === 'range';
            document.getElementById('range-view')?.style.setProperty('display', isRange ? 'flex' : 'none'); // Logic fix
            document.getElementById('stats-view').style.display = isRange ? 'none' : 'block';
            document.getElementById('main-container').style.display = isRange ? 'block' : 'none';
            document.querySelectorAll('.nav-item').forEach((n, i) => n.classList.toggle('active', (isRange && i===0) || (!isRange && i===1)));
            if(!isRange) renderStats();
            else resize();
        }

        function undo() {
            shots.pop();
            localStorage.setItem('golf_v5', JSON.stringify(shots));
            updateUI();
        }

        function clearAll() {
            if(confirm("データを全て削除しますか？")) {
                shots = [];
                localStorage.removeItem('golf_v5');
                renderStats();
                updateUI();
            }
        }

        function updateUI() {
            const clubShots = shots.filter(s => s.club === currentClub);
            document.getElementById('hud-club').innerText = currentClub;
            const avg = clubShots.length ? Math.round(clubShots.reduce((a,b)=>a+b.dist,0)/clubShots.length) : '-';
            document.getElementById('hud-avg').innerText = avg + (avg==='-'?'':'yd');
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // ヤード線
            ctx.textAlign = "left";
            ctx.font = "12px sans-serif";
            for(let i=0; i<=MAX_Y; i+=50) {
                const y = canvas.height - (i/MAX_Y * canvas.height);
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
                ctx.fillStyle = "rgba(255,255,255,0.3)";
                ctx.fillText(i+"y", 10, y-5);
            }
            // センターライン
            ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
            ctx.setLineDash([]);

            // 最近のショットを強調
            const clubShots = shots.filter(s => s.club === currentClub);
            clubShots.forEach((s, i) => {
                const isLast = i === clubShots.length - 1;
                ctx.fillStyle = isLast ? varColor('--accent') : "rgba(255,255,255,0.5)";
                ctx.beginPath();
                ctx.arc(s.x * canvas.width, s.y * canvas.height, isLast ? 6 : 4, 0, Math.PI*2);
                ctx.fill();
                if(isLast) { ctx.strokeStyle="white"; ctx.stroke(); }
            });
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        function renderStats() {
            const list = document.getElementById('stats-list');
            list.innerHTML = '';
            clubs.forEach(c => {
                const s = shots.filter(x => x.club === c);
                if(!s.length) return;
                const d = s.map(x => x.dist), sd = s.map(x => x.side);
                const card = document.createElement('div');
                card.className = 'club-card';
                card.innerHTML = `
                    <div class="card-header"><strong>${c}</strong><span>${s.length} shots</span></div>
                    <div class="summary-row">
                        <div class="summary-cell"><div>AVG</div><div>${Math.round(d.reduce((a,b)=>a+b,0)/s.length)}y</div></div>
                        <div class="summary-cell"><div>MAX</div><div>${Math.max(...d)}y</div></div>
                        <div class="summary-cell"><div>L-ERR</div><div style="color:#80d8ff">L${Math.abs(Math.min(...sd))}y</div></div>
                        <div class="summary-cell"><div>R-ERR</div><div style="color:#ff8a80">R${Math.max(...sd)}y</div></div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
