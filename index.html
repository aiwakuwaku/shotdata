<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Shot Log (Yards)</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#15803d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .active-tab { border-bottom: 4px solid #16a34a; color: #16a34a; }
        .btn-active { background-color: #22c55e !important; transform: scale(0.98); }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { opacity: 1; height: 40px; } /* 刻みボタンを見やすく */
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="flex text-center font-bold">
            <button onclick="showPage('record')" id="tab-record" class="flex-1 py-4 active-tab transition-all">計測入力</button>
            <button onclick="showPage('stats')" id="tab-stats" class="flex-1 py-4 text-gray-400 transition-all">分析データ</button>
        </div>
    </nav>

    <!-- 1. 記録ページ -->
    <div id="page-record" class="p-4 max-w-md mx-auto block">
        <div class="bg-white p-6 rounded-2xl shadow-md mb-6 border border-gray-200">
            <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-widest">Club Selection</label>
            <select id="club" class="w-full p-4 bg-gray-50 rounded-xl text-xl font-black mb-6 ring-1 ring-gray-200">
                <option value="1W">1W</option><option value="3W">3W</option><option value="5W">5W</option>
                <option value="3U">3U</option><option value="4U">4U</option><option value="5U">5U</option>
                <option value="5I">5I</option><option value="6I">6I</option><option value="7I">7I</option>
                <option value="8I">8I</option><option value="9I">9I</option><option value="PW">PW</option>
                <option value="52°">52°</option><option value="58°">58°</option>
            </select>

            <div class="grid grid-cols-1 gap-4">
                <button onclick="getLocation('start')" id="btn-start" class="w-full py-6 rounded-2xl bg-blue-600 text-white font-black text-lg shadow-lg active:bg-blue-700 transition-all">
                    打点 A を取得
                </button>
                <button onclick="getLocation('end')" id="btn-end" class="w-full py-6 rounded-2xl bg-blue-600 text-white font-black text-lg shadow-lg active:bg-blue-700 transition-all">
                    停止点 B を取得
                </button>
            </div>

            <div class="mt-8 pt-6 border-t">
                <label class="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-widest">Lateral Dispersion (yd)</label>
                <div class="flex items-center gap-2">
                    <input type="number" id="lateral-error" step="5" value="0"
                           class="w-full p-5 bg-gray-50 rounded-2xl text-2xl font-black text-center ring-1 ring-gray-200 focus:ring-green-500 outline-none">
                </div>
                <p class="text-[10px] text-center text-gray-400 mt-3 font-bold uppercase">※ 5ヤード刻み (左:マイナス / 右:プラス)</p>
            </div>

            <button onclick="saveShot()" class="w-full mt-10 bg-gray-900 text-white p-6 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all">
                SAVE RECORD
            </button>
        </div>
    </div>

    <!-- 2. 分析ページ -->
    <div id="page-stats" class="p-4 max-w-md mx-auto hidden">
        <div class="flex justify-between items-end mb-6 px-1">
            <h2 class="text-2xl font-black uppercase tracking-tighter italic">Analysis</h2>
            <span id="shot-count" class="text-xs font-bold bg-green-100 text-green-700 px-3 py-1 rounded-full">0 Shots</span>
        </div>

        <div id="stats-container" class="space-y-4"></div>

        <div class="mt-12 space-y-3 px-2">
            <button onclick="exportCSV()" class="w-full py-4 bg-white text-gray-500 rounded-xl text-sm font-bold border border-gray-200">CSVを書き出す</button>
            <button onclick="clearData()" class="w-full py-4 text-red-300 text-[10px] font-black uppercase tracking-[0.2em]">Reset Data</button>
        </div>
    </div>

    <script>
        let posA = null, posB = null;
        const M_TO_YD = 1.09361; // ヤード換算係数

        function showPage(page) {
            document.getElementById('page-record').style.display = (page === 'record') ? 'block' : 'none';
            document.getElementById('page-stats').style.display = (page === 'stats') ? 'block' : 'none';
            document.getElementById('tab-record').classList.toggle('active-tab', page === 'record');
            document.getElementById('tab-stats').classList.toggle('active-tab', page === 'stats');
            if (page === 'stats') displayStats();
        }

        function getLocation(type) {
            const btn = (type === 'start') ? document.getElementById('btn-start') : document.getElementById('btn-end');
            btn.innerText = "GPS受信中...";
            navigator.geolocation.getCurrentPosition((position) => {
                const coords = { lat: position.coords.latitude, lng: position.coords.longitude };
                if (type === 'start') { posA = coords; btn.innerText = "地点A OK"; }
                else { posB = coords; btn.innerText = "地点B OK"; }
                btn.classList.add('btn-active');
            }, (err) => alert("GPSをONにしてください"), { enableHighAccuracy: true });
        }

        function calculateDistanceYards(p1, p2) {
            const R = 6371000;
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLon/2)**2;
            const meters = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return meters * M_TO_YD; // ヤードに変換
        }

        function saveShot() {
            if (!posA || !posB) { alert("地点AとBを取得してください"); return; }
            const shot = {
                club: document.getElementById('club').value,
                dist: Math.round(calculateDistanceYards(posA, posB)),
                lat: parseInt(document.getElementById('lateral-error').value) || 0,
                ts: new Date().getTime()
            };
            const logs = JSON.parse(localStorage.getItem('golf_logs_yd') || '[]');
            logs.push(shot);
            localStorage.setItem('golf_logs_yd', JSON.stringify(logs));
            alert("保存完了！");
            location.reload();
        }

        function displayStats() {
            const logs = JSON.parse(localStorage.getItem('golf_logs_yd') || '[]');
            const container = document.getElementById('stats-container');
            document.getElementById('shot-count').innerText = `${logs.length} Shots`;

            if (!logs.length) {
                container.innerHTML = `<div class="text-center py-20 text-gray-300 font-bold uppercase tracking-widest">No Data</div>`;
                return;
            }

            const stats = logs.reduce((acc, s) => {
                if (!acc[s.club]) acc[s.club] = { d: [], l: [] };
                acc[s.club].d.push(s.dist);
                acc[s.club].l.push(s.lat);
                return acc;
            }, {});

            const clubOrder = ["1W", "3W", "5W", "3U", "4U", "5U", "5I", "6I", "7I", "8I", "9I", "PW", "52°", "58°"];
            container.innerHTML = '';

            clubOrder.forEach(club => {
                const d = stats[club];
                if (!d) return;
                const avgD = Math.round(d.d.reduce((a,b)=>a+b,0)/d.d.length);
                const avgL = (d.l.reduce((a,b)=>a+b,0)/d.l.length).toFixed(1);
                const lText = avgL > 0 ? `右 ${avgL}yd` : (avgL < 0 ? `左 ${Math.abs(avgL)}yd` : `0yd`);
                const lColor = avgL > 0 ? 'text-blue-600' : (avgL < 0 ? 'text-red-600' : 'text-gray-400');

                container.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-green-600 flex flex-col">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-2xl font-black">${club}</span>
                            <span class="text-[10px] font-black text-gray-400 bg-gray-100 px-2 py-1 rounded tracking-widest">${d.d.length}打</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <div>
                                <span class="text-[10px] text-gray-400 font-bold uppercase block mb-1">Avg Distance</span>
                                <span class="text-2xl font-black">${avgD}<span class="text-xs ml-1 font-bold">yd</span></span>
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] text-gray-400 font-bold uppercase block mb-1">Lateral Dispersion</span>
                                <span class="text-xl font-black ${lColor}">${lText}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function clearData() { if(confirm("消去しますか？")) { localStorage.clear(); location.reload(); } }
        
        function exportCSV() {
            const logs = JSON.parse(localStorage.getItem('golf_logs_yd') || '[]');
            if(!logs.length) return;
            let csv = "Club,Distance(yd),Lateral(yd)\n" + logs.map(s => `${s.club},${s.dist},${s.lat}`).join("\n");
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], {type:"text/csv"}));
            link.download = "golf_data.csv"; link.click();
        }

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(() => console.log('SW Registered'));
            });
        }
    </script>
</body>
</html>
