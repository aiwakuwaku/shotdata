<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GolfLog</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <!-- ブラウザのアドレスバーやブックマークの色を明るい緑に統一 -->
    <meta name="theme-color" content="#22c55e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="GolfLog">

    <!-- アイコン設定 -->
    <link rel="icon" type="image/svg+xml" href="icon-round.svg">
    <link rel="apple-touch-icon" href="icon.svg">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .active-tab { border-bottom: 4px solid #22c55e; color: #22c55e; }
        .btn-active { background-color: #4ade80 !important; box-shadow: 0 4px 12px rgba(74, 222, 128, 0.4); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="flex text-center font-bold">
            <button onclick="showPage('record')" id="tab-record" class="flex-1 py-4 active-tab transition-all">計測入力</button>
            <button onclick="showPage('stats')" id="tab-stats" class="flex-1 py-4 text-gray-400 transition-all">分析データ</button>
        </div>
    </nav>

    <div id="page-record" class="p-4 max-w-md mx-auto block">
        <div class="bg-white p-6 rounded-[2rem] shadow-md mb-6 border border-gray-50">
            <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">Club Selection</label>
            <select id="club" class="w-full p-4 bg-gray-50 rounded-2xl text-xl font-black mb-6 ring-1 ring-gray-100 outline-none">
                <option value="1W">1W</option><option value="3W">3W</option><option value="5W">5W</option>
                <option value="3U">3U</option><option value="4U">4U</option><option value="5U">5U</option>
                <option value="5I">5I</option><option value="6I">6I</option><option value="7I">7I</option>
                <option value="8I">8I</option><option value="9I">9I</option><option value="PW">PW</option>
                <option value="52°">52°</option><option value="58°">58°</option>
            </select>

            <div class="grid grid-cols-1 gap-3">
                <button onclick="getLocation('start')" id="btn-start" class="w-full py-5 rounded-2xl bg-blue-600 text-white font-black shadow-lg active:scale-95 transition-all">
                    地点A (打点) を取得
                </button>
                <button onclick="getLocation('end')" id="btn-end" class="w-full py-5 rounded-2xl bg-blue-600 text-white font-black shadow-lg active:scale-95 transition-all">
                    地点B (停止) を取得
                </button>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-100">
                <label class="block text-[10px] font-black text-gray-400 mb-4 uppercase tracking-widest text-center">Lateral Dispersion (yd)</label>
                <div class="flex items-center justify-between gap-4 px-2">
                    <button onclick="stepLateral(-5)" class="w-16 h-16 bg-gray-200 rounded-full text-2xl font-black shadow-inner active:bg-gray-300">－</button>
                    <div class="flex-1 text-center">
                        <input type="number" id="lateral-error" value="0" readonly class="w-full bg-transparent text-4xl font-black text-center outline-none">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Yards</span>
                    </div>
                    <button onclick="stepLateral(5)" class="w-16 h-16 bg-gray-200 rounded-full text-2xl font-black shadow-inner active:bg-gray-300">＋</button>
                </div>
                <p class="text-[9px] text-center text-gray-400 mt-5 font-bold uppercase tracking-tighter">左:マイナス / 右:プラス / 5yd刻み</p>
            </div>

            <button onclick="saveShot()" class="w-full mt-10 bg-gray-900 text-white p-6 rounded-2xl font-black text-xl shadow-2xl active:scale-95 transition-all">
                SAVE RECORD
            </button>
        </div>
    </div>

    <div id="page-stats" class="p-4 max-w-md mx-auto hidden">
        <div class="flex justify-between items-end mb-6 px-1">
            <h2 class="text-2xl font-black uppercase italic tracking-tighter">Analysis</h2>
            <span id="shot-count" class="text-xs font-bold bg-green-50 text-[#22c55e] px-3 py-1 rounded-full border border-green-100">0 Shots</span>
        </div>
        <div id="stats-container" class="space-y-4"></div>
        <div class="mt-12 space-y-3 px-2 pb-10">
            <button onclick="exportCSV()" class="w-full py-4 bg-white text-gray-500 rounded-2xl text-sm font-bold border border-gray-100 shadow-sm">CSVファイルを書き出す</button>
            <button onclick="clearData()" class="w-full py-4 text-red-200 text-[10px] font-black uppercase tracking-[0.3em]">Reset Data</button>
        </div>
    </div>

    <script>
        let posA = null, posB = null;
        const M_TO_YD = 1.09361;

        function showPage(page) {
            document.getElementById('page-record').style.display = (page === 'record') ? 'block' : 'none';
            document.getElementById('page-stats').style.display = (page === 'stats') ? 'block' : 'none';
            document.getElementById('tab-record').classList.toggle('active-tab', page === 'record');
            document.getElementById('tab-stats').classList.toggle('active-tab', page === 'stats');
            if (page === 'stats') displayStats();
        }

        function stepLateral(val) {
            const input = document.getElementById('lateral-error');
            input.value = (parseInt(input.value) || 0) + val;
        }

        function getLocation(type) {
            const btn = (type === 'start') ? document.getElementById('btn-start') : document.getElementById('btn-end');
            btn.innerText = "GPS計測中...";
            navigator.geolocation.getCurrentPosition((position) => {
                const coords = { lat: position.coords.latitude, lng: position.coords.longitude };
                if (type === 'start') { posA = coords; btn.innerText = "地点A OK ✓"; }
                else { posB = coords; btn.innerText = "地点B OK ✓"; }
                btn.classList.add('btn-active');
            }, (err) => alert("GPSを許可してください"), { enableHighAccuracy: true });
        }

        function saveShot() {
            if (!posA || !posB) { alert("地点AとBを取得してください"); return; }
            const R = 6371000;
            const dLat = (posB.lat - posA.lat) * Math.PI / 180;
            const dLon = (posB.lng - posA.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(posA.lat*Math.PI/180)*Math.cos(posB.lat*Math.PI/180)*Math.sin(dLon/2)**2;
            const dist = Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * M_TO_YD);

            const shot = { club: document.getElementById('club').value, dist, lat: parseInt(document.getElementById('lateral-error').value) || 0, ts: new Date().getTime() };
            const logs = JSON.parse(localStorage.getItem('golf_logs_final') || '[]');
            logs.push(shot);
            localStorage.setItem('golf_logs_final', JSON.stringify(logs));
            alert("保存しました"); location.reload();
        }

        function displayStats() {
            const logs = JSON.parse(localStorage.getItem('golf_logs_final') || '[]');
            const container = document.getElementById('stats-container');
            document.getElementById('shot-count').innerText = `${logs.length} Shots`;
            if (!logs.length) { container.innerHTML = `<div class="text-center py-20 text-gray-300 font-bold uppercase tracking-widest">No Data</div>`; return; }
            const clubOrder = ["1W", "3W", "5W", "3U", "4U", "5U", "5I", "6I", "7I", "8I", "9I", "PW", "52°", "58°"];
            const stats = logs.reduce((acc, s) => { if (!acc[s.club]) acc[s.club] = { d: [], l: [] }; acc[s.club].d.push(s.dist); acc[s.club].l.push(s.lat); return acc; }, {});
            container.innerHTML = '';
            clubOrder.forEach(club => {
                const d = stats[club]; if (!d) return;
                const avgD = Math.round(d.d.reduce((a,b)=>a+b,0)/d.d.length);
                const avgL = (d.l.reduce((a,b)=>a+b,0)/d.l.length).toFixed(1);
                const lText = avgL > 0 ? `右 ${avgL}yd` : (avgL < 0 ? `左 ${Math.abs(avgL)}yd` : `0yd`);
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-[2rem] shadow-sm border-l-[12px] border-[#22c55e]">
                        <div class="flex justify-between items-center mb-4"><span class="text-3xl font-black">${club}</span><span class="text-[10px] font-black text-gray-400 bg-gray-50 px-3 py-1 rounded-full">${d.d.length}打</span></div>
                        <div class="flex justify-between items-end">
                            <div><span class="text-[9px] text-gray-400 font-black uppercase block mb-1">Avg Carry</span><span class="text-3xl font-black">${avgD}<span class="text-xs ml-1 font-bold italic text-gray-400">yd</span></span></div>
                            <div class="text-right"><span class="text-[9px] text-gray-400 font-black uppercase block mb-1">Dispersion</span><span class="text-xl font-black ${avgL > 0 ? 'text-blue-600' : (avgL < 0 ? 'text-red-600' : 'text-gray-400')}">${lText}</span></div>
                        </div>
                    </div>`;
            });
        }

        function clearData() { if(confirm("消去しますか？")) { localStorage.clear(); location.reload(); } }
        function exportCSV() {
            const logs = JSON.parse(localStorage.getItem('golf_logs_final') || '[]');
            if(!logs.length) return;
            let csv = "\uFEFFClub,Distance(yd),Lateral(yd)\n" + logs.map(s => `${s.club},${s.dist},${s.lat}`).join("\n");
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], {type:"text/csv;charset=utf-8"}));
            link.download = "golf_data.csv"; link.click();
        }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }
    </script>
</body>
</html>
