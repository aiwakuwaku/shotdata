<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GolfLog</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#22c55e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="icon" type="image/svg+xml" href="icon-round.svg">
    <link rel="apple-touch-icon" href="icon.svg">

    <style>
        :root { --primary: #22c55e; --bg: #f3f4f6; --dark: #111827; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: var(--bg); color: #374151; line-height: 1.5; }
        
        nav { background: white; display: flex; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #e5e7eb; }
        nav button { flex: 1; padding: 16px; border: none; background: none; font-size: 16px; font-weight: bold; color: #9ca3af; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; }
        nav button.active { color: var(--primary); border-bottom-color: var(--primary); }

        .container { max-width: 480px; margin: 0 auto; padding: 16px; }
        .card { background: white; padding: 24px; border-radius: 32px; border: 1px solid #f3f4f6; margin-bottom: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        
        .label-tiny { font-size: 10px; font-weight: 900; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; display: block; }
        select { width: 100%; padding: 14px; border-radius: 16px; border: 1px solid #e5e7eb; background: #f9fafb; font-size: 18px; font-weight: 800; margin-bottom: 24px; appearance: none; }
        
        .btn-gps { width: 100%; padding: 20px; border-radius: 20px; border: none; background: #2563eb; color: white; font-size: 17px; font-weight: 900; margin-bottom: 12px; cursor: pointer; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .btn-gps.ok { background: var(--primary); box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2); }
        
        #shot-result-wrap { margin: 10px 0 20px; text-align: center; background: #f0fdf4; padding: 15px; border-radius: 15px; border: 2px dashed #22c55e; display: none; }
        #shot-result-val { font-size: 28px; font-weight: 900; color: #15803d; margin: 0; }

        .disp-section { margin-top: 10px; padding-top: 24px; border-top: 1px solid #f3f4f6; text-align: center; }
        .disp-controls { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: 16px; }
        .btn-side { flex: 1; height: 64px; border-radius: 20px; border: 1px solid transparent; font-size: 24px; font-weight: 900; cursor: pointer; }
        .btn-l { background: #fef2f2; color: #ef4444; border-color: #fee2e2; }
        .btn-r { background: #eff6ff; color: #3b82f6; border-color: #dbeafe; }
        
        #lat-display { font-size: 40px; font-weight: 900; margin: 0; line-height: 1; }
        .side-label { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-top: 4px; display: block; }

        .btn-save { width: 100%; padding: 22px; border-radius: 20px; border: none; background: var(--dark); color: white; font-size: 20px; font-weight: 900; margin-top: 40px; cursor: pointer; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); }

        .stats-card { background: white; padding: 20px; border-radius: 28px; border-left: 12px solid var(--primary); margin-bottom: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .club-name { font-size: 28px; font-weight: 900; letter-spacing: -0.02em; }
        .shot-count { font-size: 10px; font-weight: 800; background: #f3f4f6; padding: 4px 10px; border-radius: 99px; color: #9ca3af; }
        .stats-body { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        .stats-sub { display: flex; justify-content: space-between; border-top: 1px solid #f3f4f6; padding-top: 10px; }
        .stat-val { font-size: 26px; font-weight: 900; line-height: 1; }
        .stat-small { font-size: 18px; font-weight: 800; color: #6b7280; }
        .stat-unit { font-size: 10px; color: #9ca3af; margin-left: 2px; font-weight: bold; }

        #selector-modal { display: none; position: fixed; inset: 0; background: #1a1c1e; color: #e2e2e6; z-index: 1000; overflow-y: auto; }
        #selector-modal.active { display: block; }
        .sel-header { position: sticky; top: 0; background: #1a1c1e; padding: 24px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .sel-item { padding: 20px 24px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .sel-item.selected .radio-dot::after { content: ""; position: absolute; inset: 5px; background: #a8c7ff; border-radius: 50%; }
        .radio-dot { width: 24px; height: 24px; border: 2px solid #555; border-radius: 50%; position: relative; }

        .footer-btns { margin-top: 48px; text-align: center; padding-bottom: 40px; }
        .btn-reset { background: none; border: none; color: #fca5a5; font-size: 10px; font-weight: 900; letter-spacing: 0.2em; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <button id="tab-rec" class="active" onclick="showPage('rec')">計測入力</button>
        <button id="tab-sta" onclick="showPage('sta')">分析データ</button>
    </nav>

    <div id="page-rec" class="container">
        <div class="card">
            <span class="label-tiny">Club Selection</span>
            <select id="club-select">
                <option>1W</option><option>3W</option><option>5W</option>
                <option>3U</option><option>4U</option><option>5U</option>
                <option>5I</option><option>6I</option><option>7I</option>
                <option>8I</option><option>9I</option><option>PW</option>
                <option>52°</option><option>58°</option>
            </select>

            <button class="btn-gps" id="btn-a" onclick="fetchGPS('a')">地点A (打点) を取得</button>
            
            <div id="shot-result-wrap">
                <span class="label-tiny" style="color:#15803d">Distance Result</span>
                <p id="shot-result-val">0 <span style="font-size:14px">yd</span></p>
            </div>

            <button class="btn-gps" id="btn-b" onclick="fetchGPS('b')">地点B (停止) を取得</button>

            <div class="disp-section">
                <span class="label-tiny">Lateral Dispersion (yd)</span>
                <div class="disp-controls">
                    <button class="btn-side btn-l" onclick="openSelector('L')">L</button>
                    <div>
                        <p id="lat-display">0</p>
                        <span id="side-txt" class="side-label" style="color:#9ca3af">Straight</span>
                    </div>
                    <button class="btn-side btn-r" onclick="openSelector('R')">R</button>
                </div>
            </div>

            <button class="btn-save" onclick="saveRecord()">SAVE RECORD</button>
        </div>
    </div>

    <div id="page-sta" class="container" style="display:none">
        <div id="stats-list"></div>
        <div class="footer-btns">
            <button onclick="exportCSV()" style="margin-bottom:20px; color:#9ca3af; font-weight:bold; border:1px solid #ddd; padding:10px 20px; border-radius:10px; background:white;">CSVを書き出す</button><br>
            <button class="btn-reset" onclick="resetAll()">RESET ALL DATA</button>
        </div>
    </div>

    <div id="selector-modal">
        <div class="sel-header">
            <h2 id="sel-title" style="margin:0; font-size:20px; font-weight:900;">SELECT</h2>
            <button onclick="closeSelector()" style="background:none; border:none; color:#9ca3af; font-weight:bold; font-size:14px;">CANCEL</button>
        </div>
        <div id="sel-options"></div>
    </div>

    <script>
        // ストレージキーを完全に固定（以前のデータと混同しないよう新しい名称へ）
        const STORAGE_KEY = 'golf_app_data_v12';
        let posA = null, posB = null;
        let lateralVal = 0;

        function showPage(p) {
            document.getElementById('page-rec').style.display = p==='rec'?'block':'none';
            document.getElementById('page-sta').style.display = p==='sta'?'block':'none';
            document.getElementById('tab-rec').className = p==='rec'?'active':'';
            document.getElementById('tab-sta').className = p==='sta'?'active':'';
            // 分析画面を開くたびに最新データを描画
            if(p==='sta') renderStats();
        }

        function getDistYd(p1, p2) {
            const R = 6371000;
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLon/2)**2;
            return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * 1.09361);
        }

        function fetchGPS(type) {
            const btn = document.getElementById('btn-'+type);
            btn.innerText = "測位中...";
            navigator.geolocation.getCurrentPosition(p => {
                const c = {lat: p.coords.latitude, lng: p.coords.longitude};
                if(type==='a') {
                    posA = c;
                    document.getElementById('shot-result-wrap').style.display = 'none';
                } else {
                    posB = c;
                    if(posA) {
                        const dist = getDistYd(posA, posB);
                        document.getElementById('shot-result-val').innerHTML = `${dist} <span style="font-size:14px">yd</span>`;
                        document.getElementById('shot-result-wrap').style.display = 'block';
                    }
                }
                btn.innerText = (type==='a'?'地点A':'地点B') + " OK ✓";
                btn.classList.add('ok');
            }, e => alert("GPSを許可してください"), {enableHighAccuracy:true});
        }

        function openSelector(side) {
            const list = document.getElementById('sel-options');
            document.getElementById('sel-title').innerText = side === 'L' ? 'LEFT DISPERSION' : 'RIGHT DISPERSION';
            let html = `<div class="sel-item ${lateralVal===0?'selected':''}" onclick="setLateral(0)"><span style="font-size:22px; font-weight:bold;">0 (Straight)</span><div class="radio-dot"></div></div>`;
            for(let i=3; i<=45; i+=3) {
                const val = side === 'L' ? -i : i;
                html += `<div class="sel-item ${lateralVal===val?'selected':''}" onclick="setLateral(${val})"><span style="font-size:22px; font-weight:bold;">${i} yd</span><div class="radio-dot"></div></div>`;
            }
            list.innerHTML = html;
            document.getElementById('selector-modal').classList.add('active');
            document.getElementById('selector-modal').scrollTop = 0;
        }

        function closeSelector() { document.getElementById('selector-modal').classList.remove('active'); }
        function setLateral(v) {
            lateralVal = v;
            document.getElementById('lat-display').innerText = Math.abs(v);
            const txt = document.getElementById('side-txt');
            if(v<0) { txt.innerText="Left"; txt.style.color="#ef4444"; }
            else if(v>0) { txt.innerText="Right"; txt.style.color="#3b82f6"; }
            else { txt.innerText="Straight"; txt.style.color="#9ca3af"; }
            closeSelector();
        }

        function saveRecord() {
            if(!posA || !posB) return alert("AとBを取得してください");
            const dist = getDistYd(posA, posB);
            const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            logs.push({c: document.getElementById('club-select').value, d: dist, l: lateralVal, ts: Date.now()});
            localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
            alert("記録しました");
            location.reload();
        }

        function renderStats() {
            const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const list = document.getElementById('stats-list');
            
            if(!logs || logs.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#9ca3af; padding-top:100px; font-weight:bold;">NO DATA</p>';
                return;
            }

            const stats = logs.reduce((acc, s) => {
                if(!acc[s.c]) acc[s.c] = {d:[], l:[]};
                acc[s.c].d.push(Number(s.d)); 
                acc[s.c].l.push(Number(s.l));
                return acc;
            }, {});

            const clubOrder = ["1W","3W","5W","3U","4U","5U","5I","6I","7I","8I","9I","PW","52°","58°"];
            let html = '';

            clubOrder.forEach(club => {
                if(!stats[club]) return;
                const dists = stats[club].d;
                const avgD = Math.round(dists.reduce((a,b)=>a+b, 0) / dists.length);
                const maxD = Math.max(...dists);
                const minD = Math.min(...dists);
                const avgL = (stats[club].l.reduce((a,b)=>a+b, 0) / stats[club].l.length).toFixed(1);
                const sideColor = avgL > 0 ? '#3b82f6' : (avgL < 0 ? '#ef4444' : '#9ca3af');
                const sideTxt = avgL > 0 ? 'R '+avgL : (avgL < 0 ? 'L '+Math.abs(avgL) : '0');

                html += `<div class="stats-card">
                    <div class="stats-header"><span class="club-name">${club}</span><span class="shot-count">${dists.length} SHOTS</span></div>
                    <div class="stats-body">
                        <div><span class="label-tiny">Avg Carry</span><br><span class="stat-val">${avgD}</span><span class="stat-unit">yd</span></div>
                        <div style="text-align:right"><span class="label-tiny">Dispersion</span><br><span class="stat-val" style="color:${sideColor}">${sideTxt}</span><span class="stat-unit">yd</span></div>
                    </div>
                    <div class="stats-sub">
                        <div><span class="label-tiny">Max</span><span class="stat-small">${maxD}</span><span class="stat-unit">yd</span></div>
                        <div style="text-align:right"><span class="label-tiny">Min</span><span class="stat-small">${minD}</span><span class="stat-unit">yd</span></div>
                    </div>
                </div>`;
            });
            list.innerHTML = html;
        }

        function resetAll() { if(confirm("消去しますか？")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
        
        function exportCSV() {
            const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            if(!logs.length) return;
            let csv = "\uFEFFClub,Distance(yd),Lateral(yd)\n" + logs.map(s => `${s.c},${s.d},${s.l}`).join("\n");
            const blob = new Blob([csv], {type: "text/csv;charset=utf-8"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "golf_data.csv"; a.click();
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.onupdatefound = () => {
                        const i = reg.installing;
                        i.onstatechange = () => { if (i.state === 'installed' && navigator.serviceWorker.controller) location.reload(); };
                    };
                });
            });
        }
    </script>
</body>
</html>
