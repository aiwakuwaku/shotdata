<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Shot Tracer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 4px solid #16a34a; color: #16a34a; }
        .recording-active { background-color: #ef4444 !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <!-- ヘッダー兼タブ -->
    <nav class="bg-white shadow-sm sticky top-0 z-10">
        <div class="flex text-center font-bold text-gray-500">
            <button onclick="showPage('record')" id="tab-record" class="flex-1 py-4 active-tab">ショット記録</button>
            <button onclick="showPage('stats')" id="tab-stats" class="flex-1 py-4">統計・分散分析</button>
        </div>
    </nav>

    <!-- 1. ショット記録画面 -->
    <div id="page-record" class="p-4 max-w-md mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <label class="block text-sm font-bold text-gray-600 mb-2">使用クラブ</label>
            <select id="club" class="w-full p-4 bg-gray-100 rounded-xl text-xl font-bold mb-6 appearance-none border-none focus:ring-2 focus:ring-green-500">
                <!-- 指定されたクラブセッティング -->
                <option value="1W">1W</option>
                <option value="3W">3W</option>
                <option value="5W">5W</option>
                <option value="3U">3U</option>
                <option value="4U">4U</option>
                <option value="5U">5U</option>
                <option value="5I">5I</option>
                <option value="6I">6I</option>
                <option value="7I">7I</option>
                <option value="8I">8I</option>
                <option value="9I">9I</option>
                <option value="PW">PW</option>
                <option value="52°">52°</option>
                <option value="58°">58°</option>
            </select>

            <div class="space-y-4">
                <button onclick="getLocation('start')" id="btn-start" class="w-full py-5 rounded-xl bg-blue-600 text-white font-bold text-lg shadow-lg active:scale-95 transition-transform">
                    地点A：ここで打つ
                </button>
                
                <div class="text-center text-gray-400 font-bold">↓ ボールの場所まで移動 ↓</div>

                <button onclick="getLocation('end')" id="btn-end" class="w-full py-5 rounded-xl bg-blue-600 text-white font-bold text-lg shadow-lg active:scale-95 transition-transform">
                    地点B：ボールが止まった
                </button>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-100">
                <label class="block text-sm font-bold text-gray-600 mb-2">左右の分散（レーザー実測値）</label>
                <div class="flex items-center gap-3">
                    <input type="number" id="lateral-error" placeholder="左は -5、右は 5" class="flex-1 p-4 bg-gray-100 rounded-xl text-lg outline-none">
                    <span class="font-bold text-gray-500">m</span>
                </div>
                <p class="text-xs text-gray-400 mt-2">※ターゲットラインに対して左右に何メートルズレたか入力</p>
            </div>

            <button onclick="saveShot()" class="w-full mt-8 bg-green-600 text-white p-5 rounded-2xl font-bold text-xl shadow-xl active:scale-95 transition-transform">
                記録を保存
            </button>
        </div>
    </div>

    <!-- 2. 統計・分散分析画面 -->
    <div id="page-stats" class="p-4 max-w-md mx-auto hidden">
        <h2 class="text-lg font-bold mb-4 px-2">クラブ別 平均データ</h2>
        <div id="stats-container" class="space-y-3">
            <!-- JSで動的に生成 -->
        </div>

        <div class="mt-10 p-4">
            <button onclick="exportCSV()" class="w-full py-3 bg-gray-200 text-gray-700 rounded-lg mb-4 font-bold text-sm">CSVで書き出し</button>
            <button onclick="clearData()" class="w-full py-3 text-red-400 text-sm font-bold">全データをリセット</button>
        </div>
    </div>

    <script>
        let posA = null;
        let posB = null;

        // 画面切り替え
        function showPage(page) {
            document.getElementById('page-record').classList.toggle('hidden', page !== 'record');
            document.getElementById('page-stats').classList.toggle('hidden', page !== 'stats');
            document.getElementById('tab-record').classList.toggle('active-tab', page === 'record');
            document.getElementById('tab-stats').classList.toggle('active-tab', page === 'stats');
            if (page === 'stats') displayStats();
        }

        // GPS取得
        function getLocation(type) {
            const btn = type === 'start' ? document.getElementById('btn-start') : document.getElementById('btn-end');
            btn.innerText = "取得中...";
            
            navigator.geolocation.getCurrentPosition((position) => {
                const coords = { lat: position.coords.latitude, lng: position.coords.longitude };
                if (type === 'start') {
                    posA = coords;
                    btn.innerText = "地点A：取得済み ✓";
                    btn.classList.add('bg-green-500');
                } else {
                    posB = coords;
                    btn.innerText = "地点B：取得済み ✓";
                    btn.classList.add('bg-green-500');
                }
            }, (err) => {
                alert("GPSをONにしてください");
                btn.innerText = "再試行";
            }, { enableHighAccuracy: true });
        }

        // 2点間の距離(m)計算
        function calculateDistance(p1, p2) {
            const R = 6371000;
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(p1.lat * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // 保存
        function saveShot() {
            if (!posA || !posB) {
                alert("AとBの地点を取得してください");
                return;
            }
            const dist = calculateDistance(posA, posB);
            const latError = parseFloat(document.getElementById('lateral-error').value) || 0;
            const club = document.getElementById('club').value;

            const shot = { club, dist, latError, date: new Date().getTime() };
            const history = JSON.parse(localStorage.getItem('golf_shots') || '[]');
            history.push(shot);
            localStorage.setItem('golf_shots', JSON.stringify(history));

            // リセット
            posA = null; posB = null;
            document.getElementById('btn-start').innerText = "地点A：ここで打つ";
            document.getElementById('btn-start').classList.replace('bg-green-500', 'bg-blue-600');
            document.getElementById('btn-end').innerText = "地点B：ボールが止まった";
            document.getElementById('btn-end').classList.replace('bg-green-500', 'bg-blue-600');
            document.getElementById('lateral-error').value = '';

            alert("記録完了！");
        }

        // 統計表示
        function displayStats() {
            const history = JSON.parse(localStorage.getItem('golf_shots') || '[]');
            const container = document.getElementById('stats-container');
            
            const stats = history.reduce((acc, s) => {
                if (!acc[s.club]) acc[s.club] = { dists: [], lats: [] };
                acc[s.club].dists.push(s.dist);
                acc[s.club].lats.push(s.latError);
                return acc;
            }, {});

            container.innerHTML = history.length === 0 ? '<p class="text-center text-gray-400 py-10">データがありません</p>' : '';

            // 指定されたクラブ順に表示するための配列
            const clubOrder = ["1W", "3W", "5W", "3U", "4U", "5U", "5I", "6I", "7I", "8I", "9I", "PW", "52°", "58°"];

            clubOrder.forEach(club => {
                if (!stats[club]) return;
                const d = stats[club].dists;
                const l = stats[club].lats;
                const avgD = (d.reduce((a, b) => a + b, 0) / d.length).toFixed(1);
                const avgL = (l.reduce((a, b) => a + b, 0) / l.length).toFixed(1);
                const side = avgL > 0 ? '右' : (avgL < 0 ? '左' : '');

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl flex items-center shadow-sm border-l-4 border-green-500">
                        <div class="w-12 font-black text-xl text-green-700">${club}</div>
                        <div class="flex-1 grid grid-cols-2 ml-4">
                            <div>
                                <span class="text-xs text-gray-400 block">平均飛距離</span>
                                <span class="text-lg font-bold">${avgD}m</span>
                            </div>
                            <div>
                                <span class="text-xs text-gray-400 block">平均左右分散</span>
                                <span class="text-lg font-bold ${avgL > 0 ? 'text-blue-600' : 'text-red-600'}">${side}${Math.abs(avgL)}m</span>
                            </div>
                        </div>
                        <div class="text-xs text-gray-300">${d.length}打</div>
                    </div>
                `;
            });
        }

        function clearData() {
            if(confirm("全ての記録を消去しますか？")) {
                localStorage.removeItem('golf_shots');
                displayStats();
            }
        }

        function exportCSV() {
            const history = JSON.parse(localStorage.getItem('golf_shots') || '[]');
            if (history.length === 0) return;
            let csv = "Club,Distance(m),LateralError(m),Date\n";
            history.forEach(s => {
                csv += `${s.club},${s.dist},${s.latError},${new Date(s.date).toLocaleString()}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'golf_data.csv');
            a.click();
        }
    </script>
</body>
</html>
